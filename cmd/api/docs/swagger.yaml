host: localhost:4000
info:
  contact: {}
  description: Nigeria's Graduate Career Intelligence Platform API
  title: GradConnect API
  version: "1.0"
paths:
  /admin/analytics:
    get:
      description: |-
        Returns aggregated counts, 30-day time-series data, top employers,
        top opportunities, and recent job runs in a single response.
        Requires admin:full permission.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                data:
                  $ref: '#/definitions/data.AnalyticsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.ErrorResponse'
      summary: Admin dashboard analytics
      tags:
      - Admin
  /admin/assessments:
    get:
      description: List all assessment profiles across all employers, with employer
        stub embedded.
      parameters:
      - description: Search programme type or employer name (case-insensitive substring)
        in: query
        name: q
        type: string
      - description: Filter to a single employer (UUID)
        in: query
        name: employer_id
        type: string
      - default: -updated_at
        description: Sort field (prefix with - for descending)
        enum:
        - programme_type
        - created_at
        - updated_at
        - -programme_type
        - -created_at
        - -updated_at
        in: query
        name: sort
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Items per page (max 50)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/data.Assessment'
                  type: array
                pagination:
                  $ref: '#/definitions/data.Metadata'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                error:
                  type: string
              type: object
        "403":
          description: Forbidden
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                error:
                  type: string
              type: object
        "422":
          description: Unprocessable Entity
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                error:
                  type: object
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                error:
                  type: object
              type: object
      security:
      - SessionCookie: []
      summary: List assessments (admin)
      tags:
      - Admin
    post:
      consumes:
      - application/json
      description: Creates an assessment profile for an employer. Requires admin:full
        permission.
      parameters:
      - description: Assessment details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/data.CreateAssessmentInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                data:
                  $ref: '#/definitions/data.Assessment'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "404":
          description: Employer not found
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.ErrorResponse'
      summary: Create an assessment profile (admin only)
      tags:
      - Admin
  /admin/assessments/{id}:
    get:
      description: Fetch a single assessment by UUID with employer stub embedded.
      parameters:
      - description: Assessment UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                data:
                  $ref: '#/definitions/data.Assessment'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                error:
                  type: string
              type: object
        "403":
          description: Forbidden
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                error:
                  type: string
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                error:
                  type: string
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                error:
                  type: object
              type: object
      security:
      - SessionCookie: []
      summary: Get an assessment (admin)
      tags:
      - Admin
    patch:
      consumes:
      - application/json
      description: Updates an assessment profile. Requires admin:full permission and
        current version.
      parameters:
      - description: Assessment ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/data.UpdateAssessmentInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/app.envelope'
            - properties:
                data:
                  $ref: '#/definitions/data.Assessment'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "409":
          description: Version mismatch
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/app.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.ErrorResponse'
      summary: Update an assessment profile (admin only)
      tags:
      - Admin
  /admin/employers:
    post:
      consumes:
      - application/json
      description: Creates a new employer profile. Requires admin:full permission.
      parameters:
      - description: Employer details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/data.CreateEmployerInput'
      produces:
